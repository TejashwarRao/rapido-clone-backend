spring.application.name=DRIVER-SERVICE

server.port=8083


# DATABASE
spring.datasource.url=jdbc:postgresql://postgres:5432/rapido_db
spring.datasource.username=rapido_user
spring.datasource.password=rapido_pass
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# EUREKA
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# REDIS
spring.data.redis.host=redis
spring.data.redis.port=6379


# JWT
jwt.secret=mysecretkeymysecretkeymysecretkey123456
jwt.expiration=86400000