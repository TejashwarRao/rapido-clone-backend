spring.application.name=auth-server

server.port=9000

spring.datasource.url=jdbc:postgresql://localhost:5432/rapido_db
spring.datasource.username=rapido_user
spring.datasource.password=rapido_pass

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.security.user.name=admin
spring.security.user.password=admin123

logging.level.org.springframework.security=DEBUG

spring.security.oauth2.authorizationserver.issuer=http://localhost:9000

jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9000/oauth2/jwks