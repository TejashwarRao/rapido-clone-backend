spring.application.name=NOTIFICATION-SERVICE

server.port=8086


# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/rapido_db
spring.datasource.username=rapido_user
spring.datasource.password=rapido_pass
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true


# REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6379


# RABBITMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest


# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tejadome@gmail.com
spring.mail.password=nave aktr yyeb idmn
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# JWT
jwt.secret=mySecretKeymySecretKeymySecretKey123456
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
otel.service.name=notification-service

otel.traces.exporter=otlp
otel.metrics.exporter=none

otel.exporter.otlp.endpoint=http://localhost:4317
logging.pattern.level=%5p [traceId=%X{trace_id}] [spanId=%X{span_id}]
otel.traces.sampler=parentbased_traceidratio
otel.traces.sampler.arg=1.0
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*