services:

  postgres:
    image: postgis/postgis:15-3.4
    container_name: rapido-postgres
    environment:
      POSTGRES_DB: rapido_db
      POSTGRES_USER: rapido_user
      POSTGRES_PASSWORD: rapido_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rapido-network
    restart: always

  redis:
    image: redis:7
    container_name: rapido-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rapido-network
    restart: always

  rabbitmq:
    image: rabbitmq:management
    container_name: rapido-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rapido-network
    restart: always

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8762:8761"
    networks:
      - rapido-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: always

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "9090:9090"
    networks:
      - rapido-network
    depends_on:
      - eureka-server
    restart: always

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    networks:
      - rapido-network
    depends_on:
      - postgres
      - eureka-server
    restart: always

  driver-service:
    build:
      context: ./driver-service
      dockerfile: Dockerfile
    container_name: driver-service
    ports:
      - "8083:8083"
    environment:
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    networks:
      - rapido-network
    depends_on:
      - postgres
      - eureka-server
    restart: always

  ride-service:
    build:
      context: ./ride-service
      dockerfile: Dockerfile
    container_name: ride-service
    ports:
      - "8084:8084"
    environment:
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    networks:
      - rapido-network
    depends_on:
      - postgres
      - eureka-server
      - rabbitmq
    restart: always
  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: rapido-elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g

    ports:
      - "9200:9200"
      - "9300:9300"

    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

    networks:
      - rapido-network

    restart: always
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8085:8085"
    environment:
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    networks:
      - rapido-network
    depends_on:
      - postgres
      - eureka-server
      - rabbitmq
    restart: always

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    networks:
      - rapido-network
    depends_on:
      - postgres
      - eureka-server
      - rabbitmq
    restart: always



  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - rapido-network
    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - rapido-network
    depends_on:
      - prometheus
    restart: always

networks:
  rapido-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  elasticsearch-data: